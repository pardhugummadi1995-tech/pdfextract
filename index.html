<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RISE Project Import Engine</title>
    <link rel="stylesheet" href="styles.css" />
    <!-- Vendored PDF.js (offline, UMD build) -->
    <script src="vendor/pdf.min.js"></script>
  </head>
  <body>
    <header class="app-header">
      <div class="brand">
        <div class="logo">RISE</div>
        <div>
          <h1>Project Import Engine</h1>
          <p class="tagline">Interior Shop Order Drawing → Material Indent · Phase 1 · Offline</p>
        </div>
      </div>
    </header>

    <main class="app-main">
      <section class="upload-card">
        <div id="dropzone" class="dropzone" tabindex="0">
          <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
            <path d="M12 16V4m0 0L8 8m4-4 4 4" />
            <path d="M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2" />
          </svg>
          <p class="dz-title">Drag &amp; drop a Shop Order Drawing PDF</p>
          <p class="dz-sub">or</p>
          <button id="browse-btn" class="btn primary" type="button">Browse PDF</button>
          <input id="file-input" type="file" accept="application/pdf,.pdf" hidden />
        </div>

        <div id="progress-wrap" class="progress-wrap" style="display: none">
          <div class="progress-track"><div id="progress-bar" class="progress-bar"></div></div>
          <div id="progress-text" class="progress-text"></div>
        </div>

        <div id="status" class="status"></div>
      </section>

      <div id="export-bar" class="export-bar" style="display: none">
        <span class="export-label">Export Material Indent &amp; project data:</span>
        <button id="export-json" class="btn" type="button">JSON</button>
        <button id="export-csv" class="btn" type="button">CSV</button>
        <button id="export-excel" class="btn" type="button">Excel</button>
      </div>

      <section class="layout">
        <div id="results" class="results"></div>
        <aside class="sidebar">
          <h3 class="sidebar-title">Validation</h3>
          <div id="validation" class="validation"></div>
        </aside>
      </section>
    </main>

    <footer class="app-footer">
      <span>RISE Project Import Engine — Phase 1. No backend · No OCR · No AI · Fully offline.</span>
    </footer>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
